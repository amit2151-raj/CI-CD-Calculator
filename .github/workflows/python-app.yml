name: Python CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main    

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Chechkout Repository
      uses: actions/Chechkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest
